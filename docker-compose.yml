version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: ./stroydocs
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://placeholder:5432/placeholder
        - NEXTAUTH_SECRET=build-placeholder
        - NEXTAUTH_URL=http://localhost:3000
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-s3cr3t-k3y-str0yd0cs-pr0d-2024-xK9mN2pL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://stroydocs.presentaciya.ru}
      - APP_URL=${APP_URL:-https://stroydocs.presentaciya.ru}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      - YANDEX_CLOUD_API_KEY=${YANDEX_CLOUD_API_KEY:-}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID:-}
      - YANDEX_GPT_MODEL=${YANDEX_GPT_MODEL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ifc-service:
    build:
      context: ./services/ifc-service
      args:
        # URL для скачивания бинарника IfcConvert при сборке образа.
        # Загрузите IfcConvert-v0.8.0-linux64.zip в Timeweb S3 и задайте URL в .env:
        #   IFCCONVERT_URL=https://<s3-endpoint>/<bucket>/tools/IfcConvert-v0.8.0-linux64.zip
        - IFCCONVERT_URL=${IFCCONVERT_URL:-}
    ports:
      - "8001:8001"
    environment:
      # Маппинг S3_* переменных проекта → boto3 AWS_* переменные
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY:-}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY:-}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT:-}
      - AWS_S3_BUCKET_NAME=${S3_BUCKET:-}
      - AWS_S3_REGION=${S3_REGION:-ru-1}
      - PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
