version: '3.8'
services:
  app:
    build:
      context: ./stroydocs
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://placeholder:5432/placeholder
        - NEXTAUTH_SECRET=build-placeholder
        - NEXTAUTH_URL=http://localhost:3000
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-s3cr3t-k3y-str0yd0cs-pr0d-2024-xK9mN2pL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://stroydocs.presentaciya.ru}
      - APP_URL=${APP_URL:-https://stroydocs.presentaciya.ru}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      - YANDEX_CLOUD_API_KEY=${YANDEX_CLOUD_API_KEY:-}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID:-}
      - YANDEX_GPT_MODEL=${YANDEX_GPT_MODEL:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
