version: '3.8'

# Локальная разработка ifc-service.
# Запуск: docker-compose up --build
# Сервис доступен на http://localhost:8001
#
# Переменные берутся из .env в корне репозитория (S3_* → AWS_*).

services:
  ifc-service:
    build: .
    ports:
      - "8001:8001"
    environment:
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY:-}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY:-}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT:-https://s3.twcstorage.ru}
      - AWS_S3_BUCKET_NAME=${S3_BUCKET:-}
      - AWS_S3_REGION=${S3_REGION:-ru-1}
      - PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
